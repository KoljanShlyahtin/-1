<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Интерактивная Мнемосхема</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #222; 
            font-family: Arial, sans-serif;
            overflow: hidden; /* Убираем скролл */
        }
        .schema-container {
            display: flex; 
            justify-content: center; 
            align-items: center;
            width: 100vw; 
            height: 100vh; 
            background: #333;
            padding: 10px; /* Небольшой отступ, чтобы схема не прилипала к краям */
            box-sizing: border-box;
        }
        
        #main-svg {
            /* Ключевые настройки для адаптивности без обрезки */
            width: 100%;
            height: 100%;
            max-width: 100%; /* Разрешаем схеме быть широкой */
            max-height: 100%; /* Разрешаем схеме быть высокой */
            
            background-color: #e8e4d9;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            
            /* Сохраняем пропорции, центрируем и вписываем целиком */
            object-fit: contain; 
        }
        
        /* Стили элементов */
        .interactive {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .state-off {
            stroke: #887777 !important;
            fill: transparent !important;
            stroke-width: 6px;
        }

        .state-on {
            stroke: #cc0000 !important;
            fill: rgba(255, 0, 0, 0.15) !important;
            stroke-width: 8px;
            filter: drop-shadow(0 0 4px rgba(255,0,0,0.4));
        }

        .interactive:hover {
            stroke: #ff4444 !important;
            stroke-width: 10px !important;
        }

        .hint {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255,255,255,0.95); padding: 10px;
            border-radius: 6px; font-size: 14px; z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
