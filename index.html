<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мнемосхема (Без эффектов)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
        }
        .schema-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            padding: 10px;
        }
        #main-svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 800px;
            background-color: #e8e4d9;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            border-radius: 4px;
            aspect-ratio: 1000 / 600;
            touch-action: none; 
        }

        /* === ЛИНИИ === */
        .pipe {
            fill: none;
            stroke: #555555;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        /* === ИНТЕРАКТИВНЫЕ ЭЛЕМЕНТЫ === */
        .interactive {
            cursor: pointer;
            fill: transparent;
            stroke: #555555;
            stroke-width: 6;
            /* Никаких анимаций и переходов */
        }

        /* Активное состояние (ВКЛ) */
        .interactive.active {
            stroke: #cc0000;
            fill: #ffcccc;
            stroke-width: 7;
        }

        /* Текст */
        .label {
            pointer-events: none;
            font-size: 11px;
            font-weight: bold;
            fill: #333;
            text-anchor: middle;
            dominant-baseline: middle;
            user-select: none;
        }

        .hint {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const devices = document.querySelectorAll('.interactive');
        
        devices.forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                this.classList.toggle('active');
                
                // Принудительная перерисовка для мгновенного эффекта
                this.style.display = 'none';
                this.offsetHeight; 
                this.style.display = '';
            });
        });
    });
</script>
