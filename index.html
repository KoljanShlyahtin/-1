<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мнемосхема PRO (Адаптивная)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Исправляем масштабирование схемы */
        .schema-container {
            display: flex; 
            justify-content: center; 
            align-items: center; /* Центрируем по вертикали */
            width: 100vw; 
            height: 100vh; 
            padding: 10px;
            overflow: hidden; /* Убираем прокрутку */
        }

        #main-svg {
            width: 100%; 
            height: auto; /* Автоматическая высота для сохранения пропорций */
            max-width: 1000px; /* Максимальная ширина как в viewBox */
            max-height: 100%; /* Не выходит за пределы экрана */
            background-color: #e8e4d9;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            border-radius: 4px;
            touch-action: none; 
            aspect-ratio: 1000 / 600; /* Сохраняем пропорции 1000x600 */
        }

        /* Панель управления адаптивная */
        .control-panel {
            position: absolute;
            top: 10px; /* Ближе к верху */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            z-index: 200;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 12px; /* Меньше шрифт на мобильных */
        }

        .ctrl-btn {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Адаптивные подписи */
        .label-small { font-size: 7px; } /* Чуть меньше на мобильных */
        .label { font-size: 9px; }
        
        @media (min-width: 768px) {
            .label-small { font-size: 8px; }
            .label { font-size: 10px; }
            .ctrl-btn { font-size: 13px; padding: 8px 15px; }
        }
    </style>
</head>
