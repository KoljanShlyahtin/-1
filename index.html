<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мнемосхема PRO | Адаптивная</title>
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            position: fixed;
        }

        /* Главный контейнер с центрированием и адаптацией */
        .schema-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            position: relative;
        }

        /* SVG адаптивная обертка - сохраняем пропорции и масштабируем без обрезки */
        #main-svg {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            background-color: #e8e4d9;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            touch-action: pan-x pan-y; /* улучшаем touch-скролл при зуме */
            cursor: grab;
        }
        
        /* Для предотвращения случайного выделения */
        #main-svg:active {
            cursor: grabbing;
        }

        /* Стили элементов схемы */
        .pipe {
            fill: none;
            stroke: #555555;
            stroke-width: 5.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
            vector-effect: non-scaling-stroke; /* сохраняем толщину линий при масштабировании */
        }
        
        .interactive { 
            cursor: pointer;
            fill: rgba(255,255,255,0.35);
            stroke: #555555;
            stroke-width: 5;
            transition: all 0.1s ease;
            vector-effect: non-scaling-stroke;
            touch-action: manipulation;
        }
        
        .interactive.locked { 
            cursor: not-allowed;
            opacity: 0.45;
            stroke: #777 !important;
            fill: rgba(180,180,180,0.3) !important;
            filter: grayscale(0.1);
        }
        
        .interactive.active { 
            stroke: #cc0000 !important;
            fill: rgba(204,0,0,0.2) !important;
            filter: drop-shadow(0 0 2px rgba(204, 0, 0, 0.4));
        }
        
        /* Увеличение зоны клика для мобильных устройств */
        .interactive.knife path,
        .interactive.device {
            stroke-width: 6;
            stroke: #3a3a3a;
        }
        
        .interactive.knife.locked path {
            stroke: #999 !important;
        }
        
        .interactive.active path {
            stroke: #cc0000 !important;
        }
        
        /* Стили текстовых меток — всегда читаемы */
        .label {
            pointer-events: none;
            font-weight: bold;
            fill: #2c2c2c;
            text-anchor: middle;
            dominant-baseline: central;
            user-select: none;
            font-size: 8px;
            letter-spacing: 0.3px;
        }
        .label-small {
            font-size: 6.5px;
        }
        .label-white {
            fill: #1f1f1f;
            font-size: 11px;
            font-weight: 800;
            text-shadow: 0 0 2px rgba(255,255,200,0.5);
        }
        
        /* Адаптация шрифтов для разных устройств */
        @media (min-width: 768px) {
            .label { font-size: 10px; }
            .label-small { font-size: 8px; }
            .label-white { font-size: 13px; }
        }
        
        /* Тултипы — удобные и крупные для тач-интерфейса */
        #tooltip {
            position: fixed;
            background: #d32f2f;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 2000;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            transform: translate(-50%, -140%);
        }
        
        #info-tooltip {
            position: fixed;
            background: #1e1e1eef;
            backdrop-filter: blur(8px);
            color: #f0f0f0;
            padding: 10px 18px;
            border-radius: 28px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 260px;
            text-align: center;
            font-weight: 500;
            transform: translate(-50%, -120%);
            white-space: nowrap;
        }
        
        .info-title {
            font-weight: bold;
            display: inline-block;
            margin-right: 8px;
            font-size: 14px;
            border-right: 1px solid #aaa;
            padding-right: 10px;
        }
        .info-status {
            font-size: 13px;
            display: inline-block;
        }
        .status-on { color: #ff7b72; font-weight: bold; }
        .status-off { color: #8bc34a; font-weight: bold; }
        .status-locked { color: #ffb74d; font-weight: bold; }
        
        /* дополнительный адаптив для маленьких экранов */
        @media (max-width: 640px) and (orientation: landscape) {
            .label { font-size: 7px; }
            .label-small { font-size: 5.5px; }
            .label-white { font-size: 9px; }
            #info-tooltip { font-size: 11px; padding: 6px 12px; white-space: normal; max-width: 200px; }
            .info-title { font-size: 12px; }
        }
    </style>
</head>

<script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            const allInteractive = document.querySelectorAll('.interactive');
            const errorTooltip = document.getElementById('tooltip');
            const infoTooltip = document.getElementById('info-tooltip');
            const STORAGE_KEY = 'schema_state_v2';
            let activeTimeout = null;
            
            // Инициализация звуков, но с защитой от ошибок авто-политики
            const sounds = {
                click: null,
                error: null
            };
            try {
                sounds.click = new Audio("data:audio/wav;base64,U3RlcmVvIG5vIGF1ZG8gYnV0IGNvbXBhY3QgZmFrZSBzb3VuZA==");
                sounds.error = new Audio("data:audio/wav;base64,//+4c2FtcGxlIGZha2U=");
            } catch(e) { /* без звуков */ }
            
            function playSound(name) {
                if (sounds[name] && sounds[name].cloneNode) {
                    try {
                        const clone = sounds[name].cloneNode();
                        clone.volume = 0.3;
                        clone.play().catch(()=>{});
                    } catch(e) {}
                }
            }
            
            // Загрузка сохранённого состояния
            function loadState() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const stateMap = JSON.parse(saved);
                        for (const [id, active] of Object.entries(stateMap)) {
                            if (active) {
                                const element = document.getElementById(id);
                                if (element && !element.classList.contains('active')) {
                                    element.classList.add('active');
                                }
                            }
                        }
                    } catch(e) { console.warn(e); }
                }
            }
            
            function saveState() {
                const state = {};
                allInteractive.forEach(el => {
                    if (el.id) state[el.id] = el.classList.contains('active');
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            }
            
            // Обновление блокировок: если СТД активен (device) — блокируем связанный нож (knife)
            function updateLocks() {
                // Снимаем все блокировки
                document.querySelectorAll('.locked').forEach(el => el.classList.remove('locked'));
                // Для каждого активного устройства проверяем data-pair
                allInteractive.forEach(el => {
                    if (el.classList.contains('active')) {
                        const pairId = el.getAttribute('data-pair');
                        if (pairId) {
                            const pairEl = document.getElementById(pairId);
                            if (pairEl) pairEl.classList.add('locked');
                        }
                        // Также дополнительная симметрия: если активен нож, блокируем его устройство?
                        // По логике мнемосхемы: активные заземления блокируют возможность отключения СТД?
                        // но для простоты оставим прямое правило: "активное устройство -> блокирует парный нож"
                        // Дополнительно: если активен нож (заземление), то блокируем СТД?
                        if (el.classList.contains('knife')) {
                            const targetPair = el.getAttribute('data-pair');
                            if(targetPair) {
                                const deviceEl = document.getElementById(targetPair);
                                if(deviceEl) deviceEl.classList.add('locked');
                            }
                        }
                    }
                });
                
                // Дополнительная блокировка между трансформаторами и выключателями по необходимости
                // Расширение логики: активные выключатели q5/q6 блокируют трансформатор 2Т и т.д.
                // согласно семантике схемы
                const t2 = document.getElementById('T2');
                const t1 = document.getElementById('T1');
                const q5 = document.getElementById('q5');
                const q6 = document.getElementById('q6');
                const q7 = document.getElementById('q7');
                const q8 = document.getElementById('q8');
                if(t2 && (q5?.classList.contains('active') || q6?.classList.contains('active'))) {
                    t2.classList.add('locked');
                } else if(t2 && t2.classList.contains('locked')) t2.classList.remove('locked');
                if(t1 && (q7?.classList.contains('active') || q8?.classList.contains('active'))) {
                    t1.classList.add('locked');
                } else if(t1 && t1.classList.contains('locked')) t1.classList.remove('locked');
            }
            
            function formatInfo(element) {
                const name = element.getAttribute('data-name') || element.id.toUpperCase();
                const isLock = element.classList.contains('locked');
                const isActive = element.classList.contains('active');
                let statusText = '';
                if (isLock) statusText = '<span class="status-locked">ЗАБЛОКИРОВАНО</span>';
                else if (isActive) statusText = '<span class="status-on">ВКЛЮЧЕНО</span>';
                else statusText = '<span class="status-off">ОТКЛЮЧЕНО</span>';
                return `<span class="info-title">${name}</span> <span class="info-status">${statusText}</span>`;
            }
            
            function showInfo(el, clientX, clientY) {
                if (activeTimeout) clearTimeout(activeTimeout);
                if (!infoTooltip) return;
                infoTooltip.innerHTML = formatInfo(el);
                infoTooltip.style.left = clientX + 'px';
                infoTooltip.style.top = (clientY - 20) + 'px';
                infoTooltip.style.opacity = '1';
                activeTimeout = setTimeout(() => {
                    if (infoTooltip) infoTooltip.style.opacity = '0';
                }, 1800);
            }
            
            function showError(x, y, message = "Недоступно: включена смежная цепь") {
                if (!errorTooltip) return;
                errorTooltip.textContent = message;
                errorTooltip.style.left = x + 'px';
                errorTooltip.style.top = (y - 25) + 'px';
                errorTooltip.style.opacity = '1';
                playSound('error');
                setTimeout(() => {
                    if (errorTooltip) errorTooltip.style.opacity = '0';
                }, 1400);
            }
            
            // Обработчик кликов для всех элементов
            allInteractive.forEach(el => {
                el.addEventListener('click', function(event) {
                    event.stopPropagation();
                    const x = event.clientX;
                    const y = event.clientY;
                    if (this.classList.contains('locked')) {
                        showError(x, y, "⛔ Заблокировано: смежный аппарат активен");
                        return;
                    }
                    // переключение состояния
                    this.classList.toggle('active');
                    playSound('click');
                    saveState();
                    updateLocks();
                    showInfo(this, x, y);
                });
                
                // Тач и мышь для показа тултипа при наведении
                const showOnHover = (e) => {
                    if (!e.clientX || !e.clientY) return;
                    showInfo(el, e.clientX, e.clientY);
                };
                el.addEventListener('mouseenter', showOnHover);
                el.addEventListener('touchstart', (e) => {
                    // для сенсорных: показываем тултип при касании без переключения? 
                    // Но контекстный показ, делаем легкий таймер, без конфликта клика
                    const touch = e.touches[0];
                    if (touch) showInfo(el, touch.clientX, touch.clientY);
                });
                el.addEventListener('mousemove', (e) => {
                    if (infoTooltip.style.opacity === '1') {
                        infoTooltip.style.left = e.clientX + 'px';
                        infoTooltip.style.top = (e.clientY - 20) + 'px';
                        if (activeTimeout) clearTimeout(activeTimeout);
                        activeTimeout = setTimeout(() => { if(infoTooltip) infoTooltip.style.opacity = '0'; }, 1800);
                    }
                });
                el.addEventListener('mouseleave', () => {
                    if (activeTimeout) clearTimeout(activeTimeout);
                    if (infoTooltip) infoTooltip.style.opacity = '0';
                });
            });
            
            // Загрузка сост. и 1-е обновление замков
            loadState();
            updateLocks();
            
            // Ресайз/ориентация - принудительно пересчитать тултипы, чтобы не вылезали за край
            window.addEventListener('resize', () => {
                if (infoTooltip) infoTooltip.style.opacity = '0';
                if (errorTooltip) errorTooltip.style.opacity = '0';
            });
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    if (infoTooltip) infoTooltip.style.opacity = '0';
                    if (errorTooltip) errorTooltip.style.opacity = '0';
                }, 30);
            });
            
            // Улучшение восприятия: чтобы SVG мог масштабироваться жестами (по умолчанию)
            const svgElem = document.getElementById('main-svg');
            if (svgElem) {
                svgElem.style.touchAction = 'pan-x pan-y pinch-zoom';
            }
        });
    })();
</script>
</body>
</html>
