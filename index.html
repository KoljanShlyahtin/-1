<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- КРИТИЧНО ДЛЯ ТЕЛЕФОНОВ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мнемосхема PRO</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; overflow: hidden; /* Запрещаем скролл страницы */
        }

        .schema-container {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100vw; 
            height: 100vh; 
            /* Отступ сверху, чтобы схема не залезала под кнопки */
            padding-top: 70px; 
            padding-bottom: 10px;
            padding-left: 5px;
            padding-right: 5px;
            position: relative;
        }

        #main-svg {
            /* КЛЮЧЕВОЕ РЕШЕНИЕ: Ограничиваем высоту, чтобы влезло */
            width: 100%; 
            height: 100%; 
            max-height: 100%; /* Не вылезать за пределы контейнера */
            
            background-color: #e8e4d9;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            border-radius: 4px;
            touch-action: none; 
            display: block;
        }

        /* Панель управления */
        .control-panel {
            position: absolute;
            top: 10px; /* Прижата к верху */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 15px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            z-index: 200;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .ctrl-btn {
            background: #444; color: white; border: 1px solid #666;
            padding: 6px 12px; border-radius: 20px; cursor: pointer;
            font-size: 12px; transition: all 0.2s; outline: none;
        }
        .ctrl-btn:hover { background: #555; }
        .ctrl-btn.active-mode { background: #2e7d32; border-color: #4caf50; font-weight: bold; }
        .panel-reset { background: #d32f2f; border-color: #b71c1c; }
        .panel-reset:hover { background: #b71c1c; }

        /* Подписи */
        .label { pointer-events: none; font-weight: bold; fill: #333; text-anchor: middle; dominant-baseline: middle; user-select: none; font-size: 9px; }
        .label-small { font-size: 7px; }
        .label-white { fill: #333; font-size: 12px; }

        /* Тултипы */
        #tooltip {
            position: absolute; background: #d32f2f; color: white; padding: 5px 10px;
            border-radius: 4px; font-size: 12px; pointer-events: none; opacity: 0;
            transition: opacity 0.2s; z-index: 1000; transform: translate(-50%, -150%);
        }
        #info-tooltip {
            position: absolute; background: white; color: #333; padding: 8px 12px;
            border-radius: 6px; font-size: 12px; pointer-events: none; opacity: 0;
            transition: opacity 0.1s; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #ccc; max-width: 200px; text-align: center;
            transform: translate(-50%, -120%);
        }
        .info-title { font-weight: bold; display: block; margin-bottom: 4px; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 2px;}
        .info-status { font-size: 11px; color: #666; }
        .status-on { color: #d32f2f; font-weight: bold; }
        .status-off { color: #2e7d32; font-weight: bold; }
        .status-locked { color: #f57c00; font-weight: bold; }

        /* Для очень маленьких экранов */
        @media (max-height: 500px) {
            .schema-container { padding-top: 50px; }
            .control-panel { top: 5px; padding: 4px 10px; }
            .ctrl-btn { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
